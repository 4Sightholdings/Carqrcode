<script>
  (function () {
    var root = document.getElementById('rsl4sight');
    if (!root) return;

    // 4edge marketing endpoint (test environment)
    var ENDPOINT   = 'https://test.wa.meta.systems.xfour.co.za/api/send_marketing/v1';
    // Static prospect_customer_id for 4Sight: "106" = test, "81" = production
    var CUSTOMER_ID = '106';

    var nameInput = document.getElementById('rsl4sight-name');
    var numInput  = document.getElementById('rsl4sight-number');
    var sendBtn   = root.querySelector('.rsl-submit');
    var message   = root.querySelector('.rsl-msg');
    var doneHash  = 'rsl4sight-done';

    function setMessage(t,type){ message.textContent=t; message.className='rsl-msg '+(type||''); }
    function clearMessage(){ setMessage('',''); }
    function validName(raw){ var v=(raw||'').trim(); return v.length>=2 && /[A-Za-z\u00C0-\u017F]/.test(v); }
    function normaliseSaMobile(raw){
      var d=(raw||'').replace(/\D/g,'');
      if(d.indexOf('27')===0 && d.length===11){ d=d.substring(2); }
      else if(d.indexOf('0')===0 && d.length===10){ d=d.substring(1); }
      return /^[678]\d{8}$/.test(d)?d:null;
    }
    nameInput.addEventListener('input',function(){ nameInput.classList.remove('is-valid','is-invalid'); clearMessage(); });
    nameInput.addEventListener('blur',function(){ if(!nameInput.value.trim())return; var ok=validName(nameInput.value); nameInput.classList.toggle('is-valid',ok); nameInput.classList.toggle('is-invalid',!ok); });
    numInput.addEventListener('input',function(){ this.value=this.value.replace(/[^\d\s+]/g,''); numInput.classList.remove('is-valid','is-invalid'); clearMessage(); });
    numInput.addEventListener('blur',function(){ if(!numInput.value.trim())return; var ok=!!normaliseSaMobile(numInput.value); numInput.classList.toggle('is-valid',ok); numInput.classList.toggle('is-invalid',!ok); });

    sendBtn.addEventListener('click',async function(){
      var name=nameInput.value.trim();
      var national=normaliseSaMobile(numInput.value);
      var nameOk=validName(name), numOk=!!national;
      nameInput.classList.toggle('is-invalid',!nameOk);
      numInput.classList.toggle('is-invalid',!numOk);
      if(!nameOk){ setMessage('Please enter your name.','error'); nameInput.focus(); return; }
      if(!numOk){ setMessage('Please enter a valid South African mobile number.','error'); numInput.focus(); return; }
      sendBtn.disabled=true; var original=sendBtn.textContent; sendBtn.textContent='Sending\u2026'; clearMessage();
      try{
        var res=await fetch(ENDPOINT,{ method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            prospect_mobile_number: '+27'+national,
            prospect_name: name,
            prospect_customer_id: CUSTOMER_ID
          }) });
        if(res.ok){ window.location.hash=doneHash; nameInput.value=''; numInput.value='';
          nameInput.classList.remove('is-valid','is-invalid'); numInput.classList.remove('is-valid','is-invalid'); }
        else { setMessage('The service returned an error. Please try again.','error'); }
      }catch(err){ setMessage('Could not reach the service. Please try again.','error'); }
      finally{ sendBtn.disabled=false; sendBtn.textContent=original; }
    });
  })();
</script>
